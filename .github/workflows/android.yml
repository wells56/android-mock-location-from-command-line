name: Android CI

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Install Gradle and Fix Project Structure
      run: |
        sudo apt-get update && sudo apt-get install -y gradle
        
        BUILD_FILE_PATH=$(find . -name "build.gradle" -print -quit)
        PROJECT_DIR=$(dirname "$BUILD_FILE_PATH")
        echo "找到 Android 專案目錄在: $PROJECT_DIR"
        cd "$PROJECT_DIR"
        
        # 強行生成相容舊專案的 Gradle Wrapper
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew
        
        # 【關鍵修正】無中生有建立 settings.gradle，強制告訴 Gradle 去哪裡下載 Android 打包外掛
        cat << 'EOF' > settings.gradle
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "android-mock-location-from-command-line"
        EOF

        echo "SUB_DIR=$PROJECT_DIR" >> $GITHUB_ENV

    # 執行打包
    - name: Build with Gradle
      run: |
        cd ${{ env.SUB_DIR }}
        ./gradlew assembleDebug --no-daemon

    # 搜尋編譯出來的 APK 並上傳
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-mock-gps-apk
        path: |
          **/build/outputs/apk/debug/*.apk
          **/build/outputs/apk/*.apk
