name: Android CI

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 關鍵修正：自動尋找 gradlew 檔案在哪個資料夾，並賦予執行權限
    - name: Find gradlew and Grant Permission
      run: |
        GRADLEW_PATH=$(find . -name "gradlew" -print -quit)
        if [ -z "$GRADLEW_PATH" ]; then
          echo "錯誤：整個專案內都找不到 gradlew 檔案！"
          exit 1
        fi
        GRADLE_DIR=$(dirname "$GRADLEW_PATH")
        echo "找到 Gradle 目錄在: $GRADLE_DIR"
        chmod +x "$GRADLEW_PATH"
        echo "SUB_DIR=$GRADLE_DIR" >> $GITHUB_ENV

    # 切換到正確的子資料夾進行 Gradle 打包
    - name: Build with Gradle
      run: |
        cd ${{ env.SUB_DIR }}
        ./gradlew assembleDebug --no-daemon

    # 搜尋編譯出來的 APK 並上傳
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-mock-gps-apk
        path: |
          **/build/outputs/apk/debug/*.apk
