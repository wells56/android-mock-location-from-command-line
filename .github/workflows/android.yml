name: Android CI

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 關鍵修正：安裝 Ubuntu 系統內建的 gradle，並強行在專案內建立 gradlew
    - name: Install Gradle and Generate Wrapper
      run: |
        sudo apt-get update && sudo apt-get install -y gradle
        # 尋找 settings.gradle 或是 build.gradle 所在的目錄，那是真正的專案根目錄
        BUILD_FILE_PATH=$(find . -name "build.gradle" -print -quit)
        if [ -z "$BUILD_FILE_PATH" ]; then
          echo "錯誤：專案中連 build.gradle 都找不到！"
          exit 1
        fi
        PROJECT_DIR=$(dirname "$BUILD_FILE_PATH")
        echo "找到 Android 專案目錄在: $PROJECT_DIR"
        
        # 切換進去並強行生成 gradlew 檔案
        cd "$PROJECT_DIR"
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew
        
        # 紀錄目錄路徑供下一步使用
        echo "SUB_DIR=$PROJECT_DIR" >> $GITHUB_ENV

    # 執行打包
    - name: Build with Gradle
      run: |
        cd ${{ env.SUB_DIR }}
        ./gradlew assembleDebug --no-daemon

    # 搜尋編譯出來的 APK 並上傳
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-mock-gps-apk
        path: |
          **/build/outputs/apk/debug/*.apk
