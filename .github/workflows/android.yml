name: Android CI

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Install Gradle and Restructure Project
      run: |
        sudo apt-get update && sudo apt-get install -y gradle
        
        # 1. 強行生成現代 Gradle Wrapper 8.5
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew
        
        # 2. 建立標準的現代 Android 目錄結構
        mkdir -p app/src/main
        
        # 3. 把舊專案的核心原始碼與清單搬移到標準現代位置
        if [ -d "src" ]; then mv src app/src/main/; fi
        if [ -f "AndroidManifest.xml" ]; then mv AndroidManifest.xml app/src/main/; fi
        if [ -d "res" ]; then mv res app/src/main/; fi
        
        # 4. 強制寫入現代根目錄的 settings.gradle
        cat << 'EOF' > settings.gradle
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        include ':app'
        EOF

        # 5. 強制寫入現代根目錄的 build.gradle
        cat << 'EOF' > build.gradle
        // 根目錄 build.gradle 保持乾淨即可
        EOF

        # 6. 強制寫入現代子目錄 app/build.gradle（將套件名稱改成符合你 Python 要求的 com.adbmockgps，並拉高到 Android 15/16 相容的 SDK 35）
        cat << 'EOF' > app/build.gradle
        plugins {
            id 'com.android.application' version '8.2.2'
        }

        android {
            namespace "com.adbmockgps"
            compileSdkVersion 35

            defaultConfig {
                applicationId "com.adbmockgps"
                minSdkVersion 26
                targetSdkVersion 35
                versionCode 1
                versionName "1.0"
            }

            buildTypes {
                release {
                    minifyEnabled false
                }
            }
        }

        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
        }
        EOF

    # 7. 執行標準建置打包
    - name: Build with Gradle
      run: ./gradlew :app:assembleDebug --no-daemon

    # 8. 收集編譯出來的 APK 並上傳
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-mock-gps-apk
        path: app/build/outputs/apk/debug/*.apk
