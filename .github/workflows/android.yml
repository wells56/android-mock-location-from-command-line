name: Android CI

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Install Gradle and Complete Overwrite Config
      run: |
        sudo apt-get update && sudo apt-get install -y gradle
        
        # 1. 強行生成 Gradle Wrapper 8.5
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew
        
        # 2. 強制重寫 settings.gradle（加入正確的倉庫設定）
        cat << 'EOF' > settings.gradle
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.PRESERVE_EXISTING)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "android-mock-location-from-command-line"
        EOF

        # 3. 強制重寫 build.gradle（改成現代相容格式，並直接拉高到 Android 15/16 相容的 SDK 35）
        cat << 'EOF' > build.gradle
        plugins {
            id 'com.android.application' version '8.2.2'
        }

        android {
            namespace "com.adbmockgps"
            compileSdkVersion 35

            defaultConfig {
                applicationId "com.adbmockgps"
                minSdkVersion 26
                targetSdkVersion 35
                versionCode 1
                versionName "1.0"
            }

            buildTypes {
                release {
                    minifyEnabled false
                }
            }
        }

        dependencies {
            // 這個極簡專案只需要 Android 基礎核心庫
            implementation 'androidx.appcompat:appcompat:1.6.1'
        }
        EOF

    # 4. 執行建置打包
    - name: Build with Gradle
      run: ./gradlew assembleDebug --no-daemon

    # 5. 收集編譯出來的 APK 並上傳
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-mock-gps-apk
        path: |
          **/build/outputs/apk/debug/*.apk
          **/build/outputs/apk/*.apk
